services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: skooly
      POSTGRES_PASSWORD: skooly
      POSTGRES_DB: skooly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skooly -d skooly"]
      interval: 5s
      timeout: 5s
      retries: 5

  timetable-solver:
    build:
      context: ./services/timetable-solver
    ports:
      - "8000:8000"
    environment:
      TIMETABLE_SOLVER_SECRET: ${TIMETABLE_SOLVER_SECRET:-dev-secret}

volumes:
  postgres_data:
